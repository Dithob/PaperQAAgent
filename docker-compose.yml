services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: qaagent
      POSTGRES_PASSWORD: qaagent
      POSTGRES_DB: qaagent
    ports:
      - "5432:5432"
    volumes:
      - qaagent-postgres:/var/lib/postgresql/data
      - ./infra/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qaagent -d qaagent"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  qaagent-postgres:
